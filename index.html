                <span>US units</span>
            </button>
        </div>
            
        <div class="inputs-wrapper">
            <div class="inputs-wrapper--metric-units">
                <div class="floating-input">
                    <input class="floating-input__field" type="number" id="heightInput" placeholder=" ">
                    <label class="floating-input__label" for="heightInput">Height(cm)</label>
                </div>
                <div class="floating-input">
                    <input class="floating-input__field"  type="number" id="weightInput" placeholder=" ">
                    <label class="floating-input__label" for="weightInput">Weight(kg)</label>
                </div>
            </div>
            <div class="inputs-wrapper--us-units d-none">
                <div class="floating-input">
                    <input class="floating-input__field" type="number" id="feetInput" placeholder=" ">
                    <label class="floating-input__label" for="feetInput">Feet</label>
                </div>
                <div class="floating-input">
                    <input class="floating-input__field" type="number" id="inchesInput" placeholder=" ">
                    <label class="floating-input__label" for="inchesInput">Inches</label>
                </div>
                <div class="floating-input">
                    <input class="floating-input__field"  type="number" id="poundsInput" placeholder=" ">
                    <label class="floating-input__label" for="poundsInput">Pounds</label>
                </div>
            </div>
        </div>
        <button class="btn btn--calculate" id="calculateBtn" onClick="calculateBMI()"><span>Calculate BMI</span> <svg width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">

        <div id="resultBMI">
